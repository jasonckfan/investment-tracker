<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>基金投資組合 | Investment Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="static/icons/icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 20px;
            border-bottom: 1px solid var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-card);
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--accent-blue);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 3px 3px 0 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--bg-card);
        }

        .card-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            width: 24px;
            height: 24px;
            background: var(--accent-blue);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-value.positive {
            color: var(--accent-green);
        }

        .stat-value.negative {
            color: var(--accent-red);
        }

        .progress-section {
            margin-top: 15px;
        }

        .progress-bar {
            background: var(--bg-card);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .fund-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .fund-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .fund-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-green);
            width: 100%;
            overflow: hidden;
        }

        .fund-card.warning {
            border-left-color: var(--accent-orange);
        }

        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .fund-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .fund-type {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .fund-allocation {
            background: var(--bg-secondary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .fund-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
        }

        .metric {
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 8px;
            min-width: 0;
            overflow: hidden;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metric-value {
            font-size: 1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alert-section {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(239, 68, 68, 0.1) 100%);
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .alert-title {
            color: var(--accent-orange);
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-list {
            list-style: none;
        }

        .alert-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--bg-card);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-list li:last-child {
            border-bottom: none;
        }

        .alert-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .alert-icon.warning {
            background: var(--accent-orange);
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--bg-card);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--text-secondary);
        }

        .timeline-item.completed::before {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .timeline-item.upcoming::before {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .timeline-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timeline-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .update-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .update-btn:hover {
            background: #2563eb;
        }

        .last-updated {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .no-data-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .transaction-list {
            margin-top: 15px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .transaction-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .transaction-amount {
            font-weight: bold;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--bg-card);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .add-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .add-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 基金投資組合</h1>
        <div class="subtitle">富途牛牛基金定投 | 目標：5年 $350,000</div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
        <button class="tab-btn" onclick="window.location.href='index.html'">ETF組合</button>
        <button class="tab-btn active">基金組合</button>
    </div>

    <div class="container">
        <!-- 總覽統計 -->
        <div class="card">
            <div class="card-title">
                <div class="icon" style="background: var(--accent-green);">📊</div>
                基金投資總覽
            </div>
            <div id="summaryContent">
                <div class="no-data">
                    <div class="no-data-icon">📋</div>
                    <div>尚未有基金投資記錄</div>
                    <div style="font-size: 0.9rem; margin-top: 10px; color: var(--text-secondary);">
                        計劃開始日期：2025年5月4日<br>
                        每月投入：$5,000 HKD
                    </div>
                </div>
            </div>
        </div>

        <!-- 基金詳情 -->
        <div class="card">
            <div class="card-title">
                <div class="icon" style="background: var(--accent-green);">💼</div>
                基金持倉追蹤
            </div>
            <div class="fund-grid" id="fundGrid">
                <!-- 基金卡片將由JavaScript生成 -->
            </div>
            <div class="alert-section" id="alertSection" style="display: none;">
                <div class="alert-title">
                    <span>⚠️</span>
                    提醒
                </div>
                <ul class="alert-list" id="alertList">
                    <!-- 警報將由JavaScript生成 -->
                </ul>
            </div>
        </div>

        <!-- 交易記錄 -->
        <div class="card">
            <div class="card-title">
                <div class="icon" style="background: var(--accent-green);">📝</div>
                基金交易記錄
            </div>
            <div id="transactionContent">
                <div class="no-data">
                    <div class="no-data-icon">💰</div>
                    <div>尚未有基金交易記錄</div>
                </div>
            </div>
            <a href="add-fund-transaction.html" class="add-btn">+ 添加基金交易</a>
        </div>

        <!-- 圖表 -->
        <div class="card">
            <div class="card-title">
                <div class="icon" style="background: var(--accent-green);">📈</div>
                資產增長趨勢
            </div>
            <div class="chart-container">
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <!-- 時間線 -->
        <div class="card" onclick="window.location.href='fund-milestones.html'" style="cursor: pointer;">
            <div class="card-title">
                <div class="icon" style="background: var(--accent-green);">📅</div>
                <span>重要里程碑</span>
                <span style="font-size: 0.8rem; color: var(--text-secondary); margin-left: auto;">點擊查看詳情 →</span>
            </div>
            <div class="timeline" id="timeline">
                <!-- 時間線將由JavaScript生成 -->
            </div>
        </div>

        <!-- 更新按鈕 -->
        <button class="update-btn" onclick="updateData()">
            <span id="updateText">🔄 更新數據</span>
        </button>
        <div class="last-updated" id="lastUpdated">
            最後更新：從未更新
        </div>
    </div>

    <script>
        let portfolioData = null;
        let fundPortfolio = null;
        let growthChart = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderTimeline();
            initChart();
        });

        // 加載數據
        async function loadData() {
            try {
                const response = await fetch('data/portfolio.json');
                if (response.ok) {
                    portfolioData = await response.json();
                    // 找到基金組合
                    fundPortfolio = portfolioData.portfolios.find(p => p.id === 'funds');
                    if (fundPortfolio) {
                        updateUI();
                    }
                }
            } catch (error) {
                console.error('加載數據失敗:', error);
            }
        }

        // 更新UI
        function updateUI() {
            if (!fundPortfolio) return;
            
            const hasTransactions = fundPortfolio.transactions && fundPortfolio.transactions.length > 0;
            
            if (hasTransactions) {
                updateSummaryWithRealData();
                updateTransactionList();
            } else {
                showNoDataSummary();
            }
            
            updateFundCards();
            updateAlerts();
            updateLastUpdated();
        }

        // 顯示無數據摘要
        function showNoDataSummary() {
            const summaryContent = document.getElementById('summaryContent');
            summaryContent.innerHTML = `
                <div class="no-data">
                    <div class="no-data-icon">📋</div>
                    <div>尚未有基金投資記錄</div>
                    <div style="font-size: 0.9rem; margin-top: 10px; color: var(--text-secondary);">
                        計劃開始日期：${fundPortfolio.start_date}<br>
                        每月投入：$${fundPortfolio.monthly_investment.toLocaleString()} ${fundPortfolio.currency}
                    </div>
                </div>
            `;
        }

        // 使用真實數據更新摘要
        function updateSummaryWithRealData() {
            const summary = calculateRealSummary();
            const summaryContent = document.getElementById('summaryContent');
            
            summaryContent.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">當前資產</div>
                        <div class="stat-value ${summary.totalReturn >= 0 ? 'positive' : 'negative'}">
                            $${summary.currentValue.toLocaleString()}
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">累計投入</div>
                        <div class="stat-value">$${summary.totalInvested.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">累計回報</div>
                        <div class="stat-value ${summary.totalReturn >= 0 ? 'positive' : 'negative'}">
                            $${summary.totalReturn.toLocaleString()}
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">回報率</div>
                        <div class="stat-value ${summary.returnRate >= 0 ? 'positive' : 'negative'}">
                            ${summary.returnRate}%
                        </div>
                    </div>
                </div>
                <div class="progress-section">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>目標進度</span>
                        <span>${summary.progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(summary.progress, 100)}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px; color: var(--text-secondary); font-size: 0.85rem;">
                        <span>目標：$${fundPortfolio.target_amount.toLocaleString()}</span>
                        <span>剩餘：$${summary.remaining.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        // 計算真實摘要
        function calculateRealSummary() {
            const transactions = fundPortfolio.transactions || [];
            
            let totalInvested = 0;
            transactions.forEach(trans => {
                totalInvested += trans.amount;
            });
            
            // 簡化計算：假設當前價值（實際應從基金淨值計算）
            const currentValue = totalInvested; // 暫時假設
            const totalReturn = currentValue - totalInvested;
            const returnRate = totalInvested > 0 ? ((totalReturn / totalInvested) * 100).toFixed(2) : 0;
            const progress = ((currentValue / fundPortfolio.target_amount) * 100).toFixed(1);
            const remaining = Math.max(0, fundPortfolio.target_amount - currentValue);
            
            return {
                currentValue: Math.round(currentValue),
                totalInvested: Math.round(totalInvested),
                totalReturn: Math.round(totalReturn),
                returnRate,
                progress,
                remaining: Math.round(remaining)
            };
        }

        // 更新交易記錄
        function updateTransactionList() {
            const transactions = fundPortfolio.transactions || [];
            const transactionContent = document.getElementById('transactionContent');
            
            if (transactions.length === 0) {
                transactionContent.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">💰</div>
                        <div>尚未有基金交易記錄</div>
                    </div>
                `;
                return;
            }
            
            // 按日期排序（最新的在前）
            const sortedTransactions = [...transactions].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            );
            
            transactionContent.innerHTML = `
                <div class="transaction-list">
                    ${sortedTransactions.map(trans => `
                        <div class="transaction-item">
                            <div>
                                <div style="font-weight: bold;">${trans.fund_symbol}</div>
                                <div class="transaction-date">${trans.date}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="transaction-amount">$${trans.amount.toLocaleString()}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                                    ${trans.units.toFixed(4)}單位 @ $${trans.nav.toFixed(2)}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 更新基金卡片
        function updateFundCards() {
            const grid = document.getElementById('fundGrid');
            const transactions = fundPortfolio?.transactions || [];
            
            // 計算每個基金的持有量
            const holdings = {};
            transactions.forEach(trans => {
                if (!holdings[trans.fund_symbol]) {
                    holdings[trans.fund_symbol] = { units: 0, cost: 0 };
                }
                holdings[trans.fund_symbol].units += trans.units;
                holdings[trans.fund_symbol].cost += trans.amount;
            });
            
            grid.innerHTML = fundPortfolio.investments.map(fund => {
                const holding = holdings[fund.symbol] || { units: 0, cost: 0 };
                
                return `
                    <div class="fund-card">
                        <div class="fund-header">
                            <div>
                                <div class="fund-name">${fund.name}</div>
                                <div class="fund-type">${fund.symbol}</div>
                            </div>
                            <div class="fund-allocation">${(fund.allocation * 100).toFixed(0)}%</div>
                        </div>
                        <div class="fund-metrics">
                            <div class="metric">
                                <div class="metric-label">每月投入</div>
                                <div class="metric-value">$${fund.monthly.toLocaleString()}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">持有單位</div>
                                <div class="metric-value">${holding.units > 0 ? holding.units.toFixed(4) : '--'}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">總成本</div>
                                <div class="metric-value">${holding.cost > 0 ? '$' + Math.round(holding.cost).toLocaleString() : '--'}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">配置比例</div>
                                <div class="metric-value">${(fund.allocation * 100).toFixed(0)}%</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新警報
        function updateAlerts() {
            const alertSection = document.getElementById('alertSection');
            const alertList = document.getElementById('alertList');
            const alerts = [];
            
            // 檢查再平衡日期
            const today = new Date();
            const currentMonth = today.getMonth() + 1;
            const currentDate = today.getDate();
            
            if ((currentMonth === 5 || currentMonth === 11) && currentDate <= 4) {
                const daysUntil = 4 - currentDate;
                alerts.push({
                    type: 'rebalance',
                    message: `再平衡檢視日：${currentMonth}月4日（還有${daysUntil}天）`,
                    severity: 'warning'
                });
            }
            
            // 檢查是否有交易記錄
            const hasTransactions = fundPortfolio?.transactions?.length > 0;
            if (!hasTransactions) {
                alerts.push({
                    type: 'info',
                    message: '首次買入日期：2025年5月4日，記得添加交易記錄',
                    severity: 'warning'
                });
            }
            
            if (alerts.length > 0) {
                alertSection.style.display = 'block';
                alertList.innerHTML = alerts.map(alert => `
                    <li>
                        <span class="alert-icon ${alert.severity}">${alert.severity === 'warning' ? '!' : '⚠'}</span>
                        <span>${alert.message}</span>
                    </li>
                `).join('');
            } else {
                alertSection.style.display = 'none';
            }
        }

        // 渲染時間線
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            if (!fundPortfolio) return;
            
            const today = new Date();
            
            timeline.innerHTML = fundPortfolio.milestones.map((milestone, index) => {
                const milestoneDate = new Date(milestone.date);
                const isCompleted = milestoneDate <= today;
                const isUpcoming = !isCompleted && index > 0 && new Date(fundPortfolio.milestones[index - 1].date) <= today;
                
                return `
                    <div class="timeline-item ${isCompleted ? 'completed' : ''} ${isUpcoming ? 'upcoming' : ''}">
                        <div class="timeline-date">${milestone.date}</div>
                        <div class="timeline-title">${milestone.title}</div>
                        <div class="timeline-desc">${milestone.description}</div>
                    </div>
                `;
            }).join('');
        }

        // 初始化圖表
        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            if (!fundPortfolio) return;
            
            // 生成預測數據
            const labels = [];
            const investedData = [];
            const projectedData = [];
            
            const years = fundPortfolio.contribution_years + 5; // 供款年數 + 複利年數
            
            for (let year = 0; year <= years; year++) {
                labels.push(`第${year}年`);
                
                const months = year * 12;
                const invested = Math.min(months, fundPortfolio.contribution_years * 12) * fundPortfolio.monthly_investment;
                investedData.push(invested);
                
                // 簡化計算預期資產
                let projected = 0;
                for (let i = 0; i < months && i < fundPortfolio.contribution_years * 12; i++) {
                    projected += fundPortfolio.monthly_investment * Math.pow(1 + fundPortfolio.expected_return / 12, months - i);
                }
                if (months > fundPortfolio.contribution_years * 12) {
                    const growthMonths = months - fundPortfolio.contribution_years * 12;
                    projected = projected * Math.pow(1 + fundPortfolio.expected_return, growthMonths / 12);
                }
                projectedData.push(projected);
            }
            
            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '累計投入',
                        data: investedData,
                        borderColor: '#94a3b8',
                        backgroundColor: 'rgba(148, 163, 184, 0.1)',
                        tension: 0.4
                    }, {
                        label: '預期資產',
                        data: projectedData,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#f8fafc' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                color: '#94a3b8',
                                callback: function(value) {
                                    return '$' + (value / 1000).toFixed(0) + 'K';
                                }
                            },
                            grid: { color: '#334155' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }

        // 更新數據
        async function updateData() {
            const btn = document.querySelector('.update-btn');
            const originalText = document.getElementById('updateText').textContent;
            
            btn.disabled = true;
            document.getElementById('updateText').innerHTML = '<span class="loading"></span> 更新中...';
            
            try {
                // 模擬更新
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // 重新加載數據
                await loadData();
                
            } catch (error) {
                console.error('更新失敗:', error);
                alert('更新失敗，請稍後再試');
            } finally {
                btn.disabled = false;
                document.getElementById('updateText').textContent = originalText;
            }
        }

        // 更新最後更新時間
        function updateLastUpdated() {
            if (portfolioData?.market_data?.last_updated) {
                const lastUpdated = new Date(portfolioData.market_data.last_updated);
                document.getElementById('lastUpdated').textContent = 
                    `最後更新：${lastUpdated.toLocaleString('zh-HK')}`;
            }
        }
    </script>
</body>
</html>
