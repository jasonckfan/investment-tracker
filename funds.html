<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>基金投資組合 | Investment Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="static/icons/icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 20px;
            border-bottom: 1px solid var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--bg-card);
        }

        .card-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            width: 24px;
            height: 24px;
            background: var(--accent-green);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-card);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .tab-btn.active {
            color: var(--accent-green);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: var(--accent-green);
            border-radius: 3px 3px 0 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .stat-value.positive {
            color: var(--accent-green);
        }

        .stat-value.negative {
            color: var(--accent-red);
        }

        .progress-section {
            margin-top: 15px;
        }

        .progress-bar {
            background: var(--bg-card);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .fund-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .fund-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .fund-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-green);
            width: 100%;
            overflow: hidden;
        }

        .fund-card.usd {
            border-left-color: var(--accent-blue);
        }

        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .fund-name {
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.3;
            flex: 1;
            margin-right: 10px;
        }

        .fund-badge {
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .fund-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            width: 100%;
        }

        .metric {
            background: var(--bg-secondary);
            padding: 8px;
            border-radius: 8px;
            min-width: 0;
            overflow: hidden;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.65rem;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metric-value {
            font-size: 0.9rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .currency-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .currency-tag.usd {
            background: #3b82f6;
            color: white;
        }

        .currency-tag.hkd {
            background: #10b981;
            color: white;
        }

        .summary-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            border: 1px solid var(--accent-green);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .summary-title {
            color: var(--accent-green);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--bg-card);
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: var(--text-secondary);
        }

        .summary-value {
            font-weight: bold;
        }

        .alert-section {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(239, 68, 68, 0.1) 100%);
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .alert-title {
            color: var(--accent-orange);
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-list {
            list-style: none;
        }

        .alert-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--bg-card);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .alert-list li:last-child {
            border-bottom: none;
        }

        .alert-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .alert-icon.warning {
            background: var(--accent-orange);
        }

        .alert-icon.info {
            background: var(--accent-blue);
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--bg-card);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--text-secondary);
        }

        .timeline-item.completed::before {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .timeline-item.upcoming::before {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .timeline-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timeline-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .chart-container {
            position: relative;
            height: 250px;
            margin-top: 20px;
        }

        .update-btn, .add-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .update-btn:hover, .add-btn:hover {
            background: #059669;
        }

        .last-updated {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .no-data-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .transaction-list {
            margin-top: 15px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .transaction-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .transaction-amount {
            font-weight: bold;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--bg-card);
            border-radius: 50%;
            border-top-color: var(--accent-green);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group .add-btn {
            flex: 1;
            margin-top: 0;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--accent-green);
        }

        .btn-secondary:hover {
            background: var(--accent-green);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 月供基金組合</h1>
        <div class="subtitle">6隻基金 | 富途牛牛 | 目標：5年 $500,000</div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
        <a href="index.html" class="tab-btn">ETF組合</a>
        <a href="funds.html" class="tab-btn active">基金組合</a>
    </div>

    <div class="container">
        <!-- 總覽統計 -->
        <div class="card">
            <div class="card-title">
                <div class="icon">📊</div>
                投資總覽
            </div>
            <div id="summaryContent">
                <div class="no-data">
                    <div class="loading"></div>
                    <div style="margin-top: 10px;">加載中...</div>
                </div>
            </div>
        </div>

        <!-- 基金詳情 -->
        <div class="card">
            <div class="card-title">
                <div class="icon">💼</div>
                6隻基金持倉
            </div>
            <div class="fund-grid" id="fundGrid">
                <!-- 基金卡片將由JavaScript生成 -->
            </div>
        </div>

        <!-- 交易記錄 -->
        <div class="card">
            <div class="card-title">
                <div class="icon">📝</div>
                交易記錄
            </div>
            <div id="transactionContent">
                <div class="no-data">
                    <div class="no-data-icon">💰</div>
                    <div>尚未有交易記錄</div>
                    <div style="font-size: 0.85rem; margin-top: 10px;">點擊下方按鈕添加</div>
                </div>
            </div>
            <div class="btn-group">
                <a href="add-fund-transaction.html" class="add-btn">+ 添加交易</a>
                <button class="add-btn btn-secondary" onclick="showImportHelp()">📥 批量導入</button>
            </div>
        </div>

        <!-- 圖表 -->
        <div class="card">
            <div class="card-title">
                <div class="icon">📈</div>
                資產增長趨勢
            </div>
            <div class="chart-container">
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <!-- 時間線 -->
        <div class="card" onclick="window.location.href='fund-milestones.html'" style="cursor: pointer;">
            <div class="card-title">
                <div class="icon">📅</div>
                <span>重要里程碑</span>
                <span style="font-size: 0.8rem; color: var(--text-secondary); margin-left: auto;">點擊查看詳情 →</span>
            </div>
            <div class="timeline" id="timeline">
                <!-- 時間線將由JavaScript生成 -->
            </div>
        </div>

        <!-- 更新按鈕 -->
        <button class="update-btn" onclick="updateData()">
            <span id="updateText">🔄 更新數據</span>
        </button>
        <div class="last-updated" id="lastUpdated">
            最後更新：加載中...
        </div>
    </div>

    <script>
        let portfolioData = null;
        let fundPortfolio = null;
        let growthChart = null;
        const USD_TO_HKD = 7.8;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        // 加載數據
        async function loadData() {
            try {
                const response = await fetch('data/portfolio.json');
                if (response.ok) {
                    portfolioData = await response.json();
                    fundPortfolio = portfolioData.portfolios.find(p => p.id === 'funds');
                    if (fundPortfolio) {
                        updateUI();
                        renderTimeline();
                        initChart();
                    }
                }
            } catch (error) {
                console.error('加載數據失敗:', error);
                document.getElementById('summaryContent').innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">⚠️</div>
                        <div>加載失敗</div>
                        <div style="font-size: 0.85rem; margin-top: 10px;">請檢查網絡連接</div>
                    </div>
                `;
            }
        }

        // 更新UI
        function updateUI() {
            if (!fundPortfolio) return;
            
            updateSummary();
            updateFundCards();
            updateTransactionList();
            updateLastUpdated();
        }

        // 更新摘要
        function updateSummary() {
            const summary = fundPortfolio.summary || {};
            const investments = fundPortfolio.investments || [];
            
            // 計算總值
            let totalValueHKD = 0;
            let totalMonthlyHKD = 0;
            let totalMonthlyUSD = 0;
            
            investments.forEach(inv => {
                const valueHKD = inv.currency === 'USD' 
                    ? (inv.current_value || 0) * USD_TO_HKD 
                    : (inv.current_value || 0);
                totalValueHKD += valueHKD;
                
                if (inv.currency === 'USD') {
                    totalMonthlyUSD += inv.monthly || 0;
                } else {
                    totalMonthlyHKD += inv.monthly || 0;
                }
            });
            
            const totalMonthlyHKDEquivalent = totalMonthlyHKD + (totalMonthlyUSD * USD_TO_HKD);
            const progress = ((totalValueHKD / fundPortfolio.target_amount) * 100).toFixed(1);
            
            const summaryContent = document.getElementById('summaryContent');
            summaryContent.innerHTML = `
                <div class="summary-box">
                    <div class="summary-title">💰 投資組合總值</div>
                    <div class="summary-row">
                        <span class="summary-label">當前總值 (港幣)</span>
                        <span class="summary-value">HKD $${totalValueHKD.toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">每月投入</span>
                        <span class="summary-value">HKD $${totalMonthlyHKD.toLocaleString()} + USD $${totalMonthlyUSD.toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">等值港幣</span>
                        <span class="summary-value">約 HKD $${totalMonthlyHKDEquivalent.toLocaleString()}/月</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">目標金額</span>
                        <span class="summary-value">HKD $${fundPortfolio.target_amount.toLocaleString()}</span>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">基金數量</div>
                        <div class="stat-value">${investments.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">目標進度</div>
                        <div class="stat-value positive">${progress}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">預期回報</div>
                        <div class="stat-value">${(fundPortfolio.expected_return * 100).toFixed(0)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">投資年期</div>
                        <div class="stat-value">${fundPortfolio.contribution_years}年</div>
                    </div>
                </div>
                
                <div class="progress-section">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>目標達成進度</span>
                        <span>${progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(progress, 100)}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px; color: var(--text-secondary); font-size: 0.85rem;">
                        <span>已累積：HKD $${totalValueHKD.toLocaleString()}</span>
                        <span>目標：HKD $${fundPortfolio.target_amount.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        // 更新基金卡片
        function updateFundCards() {
            const grid = document.getElementById('fundGrid');
            const investments = fundPortfolio?.investments || [];
            
            grid.innerHTML = investments.map((fund, index) => {
                const valueHKD = fund.currency === 'USD' 
                    ? (fund.current_value || 0) * USD_TO_HKD 
                    : (fund.current_value || 0);
                const isUSD = fund.currency === 'USD';
                
                return `
                    <div class="fund-card ${isUSD ? 'usd' : ''}">
                        <div class="fund-header">
                            <div class="fund-name">
                                ${index + 1}. ${fund.name}
                                <span class="currency-tag ${isUSD ? 'usd' : 'hkd'}">${fund.currency}</span>
                            </div>
                        </div>
                        <div class="fund-metrics">
                            <div class="metric">
                                <div class="metric-label">每月投入</div>
                                <div class="metric-value">${fund.currency} $${fund.monthly.toLocaleString()}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">配置比例</div>
                                <div class="metric-value">${(fund.allocation * 100).toFixed(1)}%</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">當前價值</div>
                                <div class="metric-value">${fund.currency} $${(fund.current_value || 0).toLocaleString()}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">等值港幣</div>
                                <div class="metric-value" style="color: var(--accent-green);">HKD $${valueHKD.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新交易記錄
        function updateTransactionList() {
            const transactions = fundPortfolio?.transactions || [];
            const transactionContent = document.getElementById('transactionContent');
            
            if (transactions.length === 0) {
                transactionContent.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">💰</div>
                        <div>尚未有交易記錄</div>
                        <div style="font-size: 0.85rem; margin-top: 10px;">點擊下方按鈕添加</div>
                    </div>
                `;
                return;
            }
            
            const sortedTransactions = [...transactions].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            );
            
            transactionContent.innerHTML = `
                <div class="transaction-list">
                    ${sortedTransactions.slice(0, 5).map(trans => `
                        <div class="transaction-item">
                            <div>
                                <div style="font-weight: bold;">${trans.fund_symbol}</div>
                                <div class="transaction-date">${trans.date}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="transaction-amount">${trans.currency} $${trans.amount.toLocaleString()}</div>
                                <div style="font-size: 0.8rem; color: var(--text-secondary);">
                                    ${trans.units ? trans.units.toFixed(2) : '--'} 單位
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    ${transactions.length > 5 ? `<div style="text-align: center; padding: 10px; color: var(--text-secondary);">還有 ${transactions.length - 5} 筆交易...</div>` : ''}
                </div>
            `;
        }

        // 渲染時間線
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            if (!fundPortfolio) return;
            
            const today = new Date();
            const milestones = fundPortfolio.milestones.slice(0, 5); // 只顯示前5個
            
            timeline.innerHTML = milestones.map((milestone, index) => {
                const milestoneDate = new Date(milestone.date);
                const isCompleted = milestoneDate <= today;
                const isUpcoming = !isCompleted && index > 0 && new Date(fundPortfolio.milestones[index - 1].date) <= today;
                
                return `
                    <div class="timeline-item ${isCompleted ? 'completed' : ''} ${isUpcoming ? 'upcoming' : ''}">
                        <div class="timeline-date">${milestone.date}</div>
                        <div class="timeline-title">${milestone.title}</div>
                        <div class="timeline-desc">${milestone.description}</div>
                    </div>
                `;
            }).join('');
        }

        // 初始化圖表
        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            if (!fundPortfolio) return;
            
            const labels = [];
            const investedData = [];
            const projectedData = [];
            
            const years = fundPortfolio.contribution_years + 3;
            
            for (let year = 0; year <= years; year++) {
                labels.push(`第${year}年`);
                
                const months = year * 12;
                const monthlyHKD = fundPortfolio.monthly_hkd || 5000;
                const monthlyUSD = fundPortfolio.monthly_usd || 1168;
                const monthlyTotalHKD = monthlyHKD + (monthlyUSD * USD_TO_HKD);
                
                const invested = Math.min(months, fundPortfolio.contribution_years * 12) * monthlyTotalHKD;
                investedData.push(invested);
                
                let projected = 0;
                for (let i = 0; i < months && i < fundPortfolio.contribution_years * 12; i++) {
                    projected += monthlyTotalHKD * Math.pow(1 + fundPortfolio.expected_return / 12, months - i);
                }
                if (months > fundPortfolio.contribution_years * 12) {
                    const growthMonths = months - fundPortfolio.contribution_years * 12;
                    projected = projected * Math.pow(1 + fundPortfolio.expected_return, growthMonths / 12);
                }
                projectedData.push(projected);
            }
            
            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '累計投入',
                        data: investedData,
                        borderColor: '#94a3b8',
                        backgroundColor: 'rgba(148, 163, 184, 0.1)',
                        tension: 0.4
                    }, {
                        label: '預期資產',
                        data: projectedData,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#f8fafc' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                color: '#94a3b8',
                                callback: function(value) {
                                    return '$' + (value / 1000).toFixed(0) + 'K';
                                }
                            },
                            grid: { color: '#334155' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }

        // 更新數據
        async function updateData() {
            const btn = document.querySelector('.update-btn');
            const originalText = document.getElementById('updateText').textContent;
            
            btn.disabled = true;
            document.getElementById('updateText').innerHTML = '<span class="loading"></span> 更新中...';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                await loadData();
            } catch (error) {
                console.error('更新失敗:', error);
            } finally {
                btn.disabled = false;
                document.getElementById('updateText').textContent = originalText;
            }
        }

        // 更新最後更新時間
        function updateLastUpdated() {
            if (portfolioData?.market_data?.last_updated) {
                const lastUpdated = new Date(portfolioData.market_data.last_updated);
                document.getElementById('lastUpdated').textContent = 
                    `最後更新：${lastUpdated.toLocaleString('zh-HK')}`;
            } else {
                document.getElementById('lastUpdated').textContent = '最後更新：剛剛';
            }
        }

        // 顯示導入幫助
        function showImportHelp() {
            alert('批量導入功能：\\n\\n請使用以下格式在 update_data.py 中添加：\\n\\npython3 update_data.py add-fund 日期 基金名稱 單位數 NAV 金額 貨幣\\n\\n示例：\\npython3 update_data.py add-fund 2025-05-04 "富蘭克林科技" 28.5 105.26 3000 HKD');
        }
    </script>
