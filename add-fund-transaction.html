<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加基金交易記錄 | Investment Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f8fafc;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .preset-btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px 5px 0 0;
            background: #334155;
            border: none;
            border-radius: 6px;
            color: #f8fafc;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .preset-btn:hover {
            background: #3b82f6;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #10b981;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            background: #059669;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 8px;
            border: 1px solid #334155;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result-title {
            color: #10b981;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-code {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #94a3b8;
            word-break: break-all;
        }
        
        .copy-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            padding: 15px;
            background: #1e293b;
            border-radius: 8px;
        }
        
        .help-text {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .fund-info {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .fund-item {
            padding: 10px;
            background: #334155;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .fund-name {
            font-weight: bold;
        }
        
        .fund-amount {
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 添加基金交易記錄</h1>
        
        <div class="fund-info">
            <div class="fund-item">
                <div class="fund-name">富蘭克林科技基金</div>
                <div class="fund-amount">每月投入: HKD $3,000 (60%)</div>
            </div>
            <div class="fund-item">
                <div class="fund-name">安聯環球人工智能股票基金</div>
                <div class="fund-amount">每月投入: HKD $1,000 (20%)</div>
            </div>
            <div class="fund-item">
                <div class="fund-name">瀚亞投資-日本動力股票基金</div>
                <div class="fund-amount">每月投入: HKD $1,000 (20%)</div>
            </div>
        </div>
        
        <form id="transactionForm">
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="date" required>
                <div>
                    <button type="button" class="preset-btn" onclick="setToday()">今天</button>
                    <button type="button" class="preset-btn" onclick="setDate('2025-05-04')">5月4日</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>基金</label>
                <select id="fund" required>
                    <option value="富蘭克林科技">富蘭克林科技基金</option>
                    <option value="安聯環球人工智能">安聯環球人工智能股票基金</option>
                    <option value="瀚亞日本動力">瀚亞投資-日本動力股票基金</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>買入金額 (HKD)</label>
                <input type="number" id="amount" step="0.01" required>
                <div>
                    <button type="button" class="preset-btn" onclick="setAmount(3000)">$3,000 (富蘭克林)</button>
                    <button type="button" class="preset-btn" onclick="setAmount(1000)">$1,000 (其他)</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>基金單位淨值 (NAV)</label>
                <input type="number" id="nav" step="0.0001" required>
                <div class="help-text">從富途牛牛交易確認單查看</div>
            </div>
            
            <div class="form-group">
                <label>買入單位數</label>
                <input type="number" id="units" step="0.0001" required>
                <div class="help-text">系統會自動計算：單位數 = 金額 / NAV</div>
            </div>
            
            <button type="submit" class="submit-btn">生成交易指令</button>
        </form>
        
        <div class="result" id="result">
            <div class="result-title">✅ 交易指令已生成</div>
            <div class="result-code" id="resultCode"></div>
            <button type="button" class="copy-btn" onclick="copyCode()">複製指令</button>
        </div>
        
        <a href="funds.html" class="back-link">← 返回基金頁面</a>
    </div>
    
    <script>
        // 設置默認日期為今天
        document.getElementById('date').valueAsDate = new Date();
        
        // 自動計算單位數
        document.getElementById('amount').addEventListener('input', calculateUnits);
        document.getElementById('nav').addEventListener('input', calculateUnits);
        
        function calculateUnits() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const nav = parseFloat(document.getElementById('nav').value) || 0;
            if (nav > 0) {
                document.getElementById('units').value = (amount / nav).toFixed(4);
            }
        }
        
        function setToday() {
            document.getElementById('date').valueAsDate = new Date();
        }
        
        function setDate(date) {
            document.getElementById('date').value = date;
        }
        
        function setAmount(amount) {
            document.getElementById('amount').value = amount;
            calculateUnits();
        }
        
        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            const fund = document.getElementById('fund').value;
            const units = document.getElementById('units').value;
            const nav = document.getElementById('nav').value;
            const amount = document.getElementById('amount').value;
            
            const code = `python3 update_data.py add-fund ${date} "${fund}" ${units} ${nav} ${amount}`;
            
            document.getElementById('resultCode').textContent = code;
            document.getElementById('result').classList.add('show');
        });
        
        function copyCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('指令已複製到剪貼簿');
            });
        }
    </script>
</body>
</html>
